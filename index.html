<!DOCTYPE html>
<html>
<head>
  <title>Archive Utility Pro</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      width: 420px;
      padding: 30px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    p {
      color: #cbd5e1;
      font-size: 12px;
      margin-bottom: 25px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
    }

    .extract {
      background: #3b82f6;
      color: white;
    }

    .extract:hover {
      background: #2563eb;
    }

    .create {
      background: #22c55e;
      color: white;
    }

    .create:hover {
      background: #16a34a;
    }

    .drag {
      margin-top: 15px;
      padding: 20px;
      border: 2px dashed rgba(255,255,255,0.3);
      border-radius: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Archive Utility Pro</h1>
    <p>ZIP • RAR • 7Z • TAR • GZ • DMG</p>

    <button class="btn extract" onclick="extract()">
      📦 Extract Archive
    </button>

    <button class="btn create" onclick="createArchive()">
      🗜️ Create Archive
    </button>

    <div class="drag">
      Drag & Drop files here (coming soon)
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
