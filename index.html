<!DOCTYPE html>
<html>
<head>
  <title>Archive Pro</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: #0a0f1c;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 460px;
      background: #111827;
      padding: 25px;
      border-radius: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .extract { background: #3b82f6; color: white; }
    .create { background: #22c55e; color: white; }
    .cancel { background: #ef4444; color: white; }

    .bar {
      width: 100%;
      height: 10px;
      background: #1f2937;
      border-radius: 20px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: #22c55e;
      transition: width 0.15s;
    }

    .status {
      font-size: 12px;
      margin-top: 10px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <div class="box">

    <h2>Archive Utility Pro</h2>

    <button class="extract" onclick="extract()">Extract Archive</button>
    <button class="create" onclick="create()">Create Archive</button>
    <button class="cancel" onclick="cancel()">Cancel</button>

    <div class="bar">
      <div class="progress" id="bar"></div>
    </div>

    <div class="status" id="status">Ready</div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
